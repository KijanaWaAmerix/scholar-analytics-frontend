<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scholar Analytics — SuperAdmin Login</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="../css/mobile.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    body {
      background: linear-gradient(145deg,#0a0f1e,#0f1a2e,#1a0a2e);
      min-height: 100vh;
      display   : flex;
      align-items: center;
      justify-content: center;
      padding   : 24px;
      font-family: var(--font-body);
    }

    .sa-login-card {
      background   : rgba(255,255,255,0.04);
      border       : 1px solid rgba(255,255,255,0.10);
      border-radius: 24px;
      padding      : 48px 44px;
      width        : 100%;
      max-width    : 440px;
      backdrop-filter: blur(24px);
      box-shadow   : 0 24px 80px rgba(0,0,0,0.40);
      animation    : cardIn 0.5s cubic-bezier(0.16,1,0.3,1);
    }

    @keyframes cardIn {
      from { opacity:0; transform:translateY(24px) scale(0.97); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }

    /* Glow blob */
    body::before {
      content : '';
      position: fixed;
      width   : 600px;
      height  : 600px;
      background: radial-gradient(ellipse, rgba(142,68,173,0.15), transparent 70%);
      top     : 50%; left: 50%;
      transform: translate(-50%,-50%);
      pointer-events: none;
    }

    .sa-logo {
      width          : 64px;
      height         : 64px;
      background     : linear-gradient(135deg,#6c3483,#8e44ad);
      border-radius  : 18px;
      display        : flex;
      align-items    : center;
      justify-content: center;
      font-size      : 28px;
      color          : white;
      margin         : 0 auto 24px;
      box-shadow     : 0 8px 24px rgba(142,68,173,0.40);
    }

    .sa-title {
      font-family  : var(--font-display);
      font-size    : 1.6rem;
      font-weight  : 700;
      color        : white;
      text-align   : center;
      margin-bottom: 6px;
    }

    .sa-sub {
      font-size   : var(--text-sm);
      color       : rgba(255,255,255,0.45);
      text-align  : center;
      margin-bottom: 32px;
    }

    .sa-badge {
      display        : flex;
      align-items    : center;
      justify-content: center;
      gap            : 6px;
      padding        : 5px 14px;
      background     : rgba(142,68,173,0.20);
      border         : 1px solid rgba(142,68,173,0.35);
      border-radius  : var(--radius-full);
      font-size      : var(--text-xs);
      font-weight    : 700;
      color          : #c39bd3;
      text-transform : uppercase;
      letter-spacing : 1px;
      margin         : 0 auto 24px;
      width          : fit-content;
    }

    .sa-field { margin-bottom: 18px; }

    .sa-field label {
      display       : block;
      font-size     : var(--text-xs);
      font-weight   : 700;
      color         : rgba(255,255,255,0.50);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom : 8px;
    }

    .sa-input {
      width        : 100%;
      padding      : 12px 16px;
      background   : rgba(255,255,255,0.06);
      border       : 1.5px solid rgba(255,255,255,0.10);
      border-radius: var(--radius-sm);
      color        : white;
      font-size    : var(--text-base);
      font-family  : var(--font-body);
      outline      : none;
      transition   : border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    .sa-input::placeholder { color: rgba(255,255,255,0.25); }

    .sa-input:hover {
      border-color: rgba(255,255,255,0.20);
      background  : rgba(255,255,255,0.08);
    }

    .sa-input:focus {
      border-color: #8e44ad;
      box-shadow  : 0 0 0 3px rgba(142,68,173,0.20);
      background  : rgba(255,255,255,0.08);
    }

    .sa-btn-login {
      width        : 100%;
      padding      : 13px;
      background   : linear-gradient(135deg,#6c3483,#8e44ad);
      color        : white;
      font-size    : var(--text-base);
      font-weight  : 700;
      border       : none;
      border-radius: var(--radius-sm);
      cursor       : pointer;
      font-family  : var(--font-body);
      transition   : transform 0.2s, box-shadow 0.2s;
      box-shadow   : 0 4px 16px rgba(142,68,173,0.40);
      margin-top   : 8px;
    }

    .sa-btn-login:hover {
      transform : translateY(-2px);
      box-shadow: 0 8px 24px rgba(142,68,173,0.55);
    }

    .sa-btn-login:disabled { opacity:0.6; cursor:not-allowed; transform:none; }

    .sa-error {
      display      : none;
      align-items  : center;
      gap          : 8px;
      padding      : 10px 14px;
      background   : rgba(231,76,60,0.15);
      border       : 1px solid rgba(231,76,60,0.30);
      border-radius: var(--radius-sm);
      font-size    : var(--text-sm);
      color        : #e74c3c;
      margin-bottom: 16px;
    }

    .sa-back {
      display        : flex;
      align-items    : center;
      justify-content: center;
      gap            : 6px;
      margin-top     : 24px;
      font-size      : var(--text-sm);
      color          : rgba(255,255,255,0.35);
      text-decoration: none;
      transition     : color 0.2s;
    }

    .sa-back:hover { color: rgba(255,255,255,0.65); }
  </style>
</head>
<body>
  <div class="sa-login-card">

    <div class="sa-logo"><i class="fas fa-shield-halved"></i></div>

    <h1 class="sa-title">Scholar Analytics</h1>
    <p class="sa-sub">SuperAdmin Control Panel</p>

    <div class="sa-badge">
      <i class="fas fa-circle" style="font-size:7px;color:#9b59b6;"></i>
      Restricted Access
    </div>

    <div class="sa-error" id="saError">
      <i class="fas fa-circle-xmark"></i>
      <span id="saErrorMsg">Invalid credentials.</span>
    </div>

    <div class="sa-field">
      <label>Email Address</label>
      <input type="email" id="saEmail" class="sa-input"
        placeholder="superadmin@email.com" autocomplete="email"/>
    </div>

    <div class="sa-field">
      <label>Password</label>
      <input type="password" id="saPassword" class="sa-input"
        placeholder="Enter password" autocomplete="current-password"/>
    </div>

    <button class="sa-btn-login" id="saLoginBtn">
      <span id="saLoginText">
        <i class="fas fa-shield-halved"></i> &nbsp;Access Control Panel
      </span>
      <span id="saLoginSpinner" style="display:none;">
        <i class="fas fa-spinner fa-spin"></i> Authenticating...
      </span>
    </button>

    <a href="login.html" class="sa-back">
      <i class="fas fa-arrow-left"></i> Back to School Login
    </a>

  </div>

<script src="../js/api.js"></script>
<script>
  /* Redirect if already logged in as superadmin */
  const existing = Auth.getUser();
  if (existing?.role === 'superadmin') {
    window.location.href = 'sa-dashboard.html';
  }

  const loginBtn   = document.getElementById('saLoginBtn');
  const loginText  = document.getElementById('saLoginText');
  const loginSpinner=document.getElementById('saLoginSpinner');
  const errorBox   = document.getElementById('saError');
  const errorMsg   = document.getElementById('saErrorMsg');

  const showError = (msg) => {
    errorBox.style.display = 'flex';
    errorMsg.textContent   = msg;
  };

  const hideError = () => { errorBox.style.display = 'none'; };

  /* Enter key */
  document.getElementById('saPassword')
    ?.addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

  loginBtn?.addEventListener('click', doLogin);

  async function doLogin() {
    hideError();

    const email    = document.getElementById('saEmail')?.value.trim();
    const password = document.getElementById('saPassword')?.value;

    if (!email || !password) {
      showError('Please enter your email and password.');
      return;
    }

    loginBtn.disabled          = true;
    loginText.style.display    = 'none';
    loginSpinner.style.display = 'inline';

    const result = await API.post('/auth/login', { email, password });

    loginBtn.disabled          = false;
    loginText.style.display    = 'inline';
    loginSpinner.style.display = 'none';

    if (!result?.ok) {
      showError(result?.data?.message || 'Invalid credentials.');
      return;
    }

    const { token, user } = result.data;

    if (user.role !== 'superadmin') {
      showError('Access denied. SuperAdmin credentials required.');
      return;
    }

    Auth.setSession(token, user);
    window.location.href = 'sa-dashboard.html';
  }
</script>
</body>
</html>
